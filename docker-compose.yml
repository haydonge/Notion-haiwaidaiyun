version: '3.8'

services:
  notion-next:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NOTION_PAGE_ID=${NOTION_PAGE_ID:-61da66095f494ce48d32cf6780170553}
        - NEXT_PUBLIC_THEME=${NEXT_PUBLIC_THEME:-heo}
    container_name: notion-haiwaidaiyun
    ports:
      - "3000:3000"
    environment:
      # 基础配置
      - NOTION_PAGE_ID=${NOTION_PAGE_ID:-61da66095f494ce48d32cf6780170553}
      - NEXT_PUBLIC_THEME=${NEXT_PUBLIC_THEME:-heo}
      - NEXT_PUBLIC_LANG=${NEXT_PUBLIC_LANG:-zh-CN}
      - NEXT_PUBLIC_SINCE=${NEXT_PUBLIC_SINCE:-2015}
      
      # 网站信息
      - NEXT_PUBLIC_AUTHOR=${NEXT_PUBLIC_AUTHOR:-海外代孕}
      - NEXT_PUBLIC_BIO=${NEXT_PUBLIC_BIO:-海外合法代孕服务}
      - NEXT_PUBLIC_LINK=${NEXT_PUBLIC_LINK:-https://suprebaby.com}
      - NEXT_PUBLIC_KEYWORD=${NEXT_PUBLIC_KEYWORD:-代孕官网,海外代孕,合法代孕}
      
      # 外观配置
      - NEXT_PUBLIC_APPEARANCE=${NEXT_PUBLIC_APPEARANCE:-light}
      - NEXT_PUBLIC_APPEARANCE_DARK_TIME=${NEXT_PUBLIC_APPEARANCE_DARK_TIME:-[18,6]}
      
      # 功能配置
      - NEXT_PUBLIC_PSEUDO_STATIC=${NEXT_PUBLIC_PSEUDO_STATIC:-false}
      - NEXT_PUBLIC_REVALIDATE_SECOND=${NEXT_PUBLIC_REVALIDATE_SECOND:-60}
      - NEXT_PUBLIC_ENABLE_RSS=${NEXT_PUBLIC_ENABLE_RSS:-true}
      
      # 数据库配置（如需要）
      - DATABASE_URL=${DATABASE_URL:-}
      - REDIS_URL=${REDIS_URL:-}
      
      # 分析统计
      - NEXT_PUBLIC_ANALYTICS_GOOGLE_ID=${NEXT_PUBLIC_ANALYTICS_GOOGLE_ID:-}
      - NEXT_PUBLIC_ANALYTICS_BAIDU_ID=${NEXT_PUBLIC_ANALYTICS_BAIDU_ID:-}
      
      # 评论系统
      - NEXT_PUBLIC_COMMENT_SYSTEM=${NEXT_PUBLIC_COMMENT_SYSTEM:-}
      
      # 广告配置
      - NEXT_PUBLIC_ADSENSE_GOOGLE_ID=${NEXT_PUBLIC_ADSENSE_GOOGLE_ID:-}
      
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notion-next.rule=Host(\`${DOMAIN:-localhost}\`)"
      - "traefik.http.routers.notion-next.entrypoints=websecure"
      - "traefik.http.routers.notion-next.tls.certresolver=letsencrypt"
      - "traefik.http.services.notion-next.loadbalancer.server.port=3000"

networks:
  dokploy-network:
    external: true